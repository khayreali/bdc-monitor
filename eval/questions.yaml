      - "above/below 1.0x classification"
    relevant_filings: []
    relevant_section_types: ["mdna", "notes"]
    difficulty: hard

  # TODO: needs hand-review — all configs got fact_recall=0. reconciliation
  # questions are the hardest category. needs very specific expected_facts
  # grounded in what the filings actually say.
  - question: "For BDCs that reported increased non-accruals in Q4 2025, did their MD&A acknowledge the deterioration or downplay it?"
