    relevant_filings: []
    relevant_section_types: ["schedule_of_investments", "mdna"]
    difficulty: hard

  # TODO: needs hand-review — all configs got fact_recall=0. cross-issuer
  # ranking needs data from all 8 BDCs which 20 chunks can't cover.
  - question: "Rank the 8 BDCs by net investment income yield on NAV for the most recent quarter. Which ones are covering their dividend?"
