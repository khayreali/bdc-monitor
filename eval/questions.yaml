    difficulty: hard

  # TODO: needs hand-review — all configs got fact_recall=0. cross-period
  # cross-section comparison. may need to be broken into simpler sub-questions.
  - question: "Which BDCs increased their allocation to second lien or subordinated debt between 2024 and 2025, and did any of them flag this as a risk?"
    expected_facts:
